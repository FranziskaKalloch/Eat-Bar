<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eat Bar</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/basket.css" />
    <link rel="stylesheet" href="./styles/responsive.css" />
    <script src="./script/data.js" defer></script>
    <script src="./script/main.js" defer></script>
    <script src="./script/template.js" defer></script>

    <link rel="icon" type="image/x-icon" href="./assets/icon/icons8-mahlzeit-96.png" />
  </head>

  <body onload="init()">
    <header>
      <div class="frame-header">
        <div class="logo-container">
          <img class="logo" src="./assets/eat-bar-logo.png" alt="Eat Bar Logo" />
          <span>food delivery</span>
        </div>

        <div>
          <img src="./assets/icon/icons8-menü-50.png" alt="Menu Icon" />
        </div>
      </div>
    </header>

    <section class="welcome">
      <img src="./assets/img/headline-img.png" class="main-img" alt="Burger headline image" />
      <img src="./assets/icon/imbisswagen.png" class="main-icon" alt="Food truck icon" />

      <div class="headline">
        <div class="burger-house">
          <h1>Burger<span class="highlight">House</span></h1>

          <div class="star-container">
            <img src="./assets/icon/icons8-stern.png" class="star-img" alt="Star icon" />
            <span>4,5 (4000)</span>
          </div>
        </div>

        <span class="welcome-text"> Best of burgers, Pizza, and Greens, all in one great place. </span>
      </div>
    </section>

    <!---------------- PAGE CONTENT---------------->
    <main class="page-content">
      <!---------------- BURGER SECTION ---------------->
      <section class="menu-section">
        <div class="menu-header">
          <div class="menu-header-inner">
            <img src="./assets/icon/burger.png" class="burger-icon" alt="Burger icon" />
            <h2>Burger</h2>
          </div>
        </div>

        <div class="frame-main">
          <div class="frame-meal">
            <div class="card-container" id="burgerCards"></div>
          </div>

          <!---------------- BASKET ---------------->
          <aside class="frame-basket">
            <div class="basket">
              <div class="basket-headline">
                <h3>Your Basket</h3>
              </div>

              <div id="basketContent"></div>

              <div class="sum-section" id="sumSection">
                <div class="sum-row">
                  <p>Subtotal</p>
                  <p id="subTotal">Price</p>
                </div>

                <div class="sum-row">
                  <p>Delivery Fee</p>
                  <p id="deliveryFee">Price</p>
                </div>

                <div class="sum-row total-row">
                  <p>Total</p>
                  <p id="totalPrice">Price</p>
                </div>

                <button class="basket-btn" id="buyButton" onclick="openDialog()">Buy Now (price)</button>
              </div>
            </div>
          </aside>
        </div>
      </section>

      <!---------------- PIZZA SECTION ---------------->
      <section class="menu-section">
        <div class="menu-header">
          <div class="menu-header-inner">
            <img src="./assets/icon/pizza.png" class="burger-icon" alt="Pizza icon" />
            <h2>Pizza (30cm)</h2>
          </div>
        </div>

        <div class="frame-main">
          <div class="frame-meal">
            <div class="card-container pizza-card-container" id="pizzaCards"></div>
          </div>
        </div>
      </section>
    </main>

    <!----- FOOOTER DESKTOP ----->

    <footer class="footer-desktop">
      <div class="frame-footer">
        <img class="logo" src="./assets/eat-bar-logo.png" alt="Eat Bar Logo" />
      </div>
    </footer>

    <!----- FOOOTER MOBILE ----->

    <footer class="footer-mobile">
      <div class="footer-icon">
        <img src="./assets/icon/home.png" />
      </div>

      <div class="footer-icon">
        <img src="./assets/icon/account.png" />
      </div>

      <div class="footer-icon">
        <img src="./assets/icon/responsive-star-icon.png" />
      </div>

      <div class="footer-icon basket-icon">
        <button class="basket-overlay-btn" onclick="openBasketOverlay()">
          <img src="./assets/icon/shopping-cart.png" />
          <span id="basketCount">0</span>
        </button>
      </div>
    </footer>

    <!----- BASKET OVERLAY----->

    <div id="basketOverlay" class="basket-overlay d-none">
      <div class="basket-overlay-content">
        <div class="overlay-header">
          <button onclick="closeBasketOverlay()" style="color: white; background-color: transparent">X</button>
        </div>

        <div class="basket mobile-basket">
          <div class="basket-headline">
            <h3 style="text-align: center">Your Basket</h3>
          </div>

          <div id="basketContentMobile"></div>

          <div class="sum-section" id="sumSectionOverlay">
            <div class="sum-row">
              <p>Subtotal</p>
              <p id="subTotalMobile"></p>
            </div>

            <div class="sum-row">
              <p>Delivery Fee</p>
              <p id="deliveryFeeMobile"></p>
            </div>

            <div class="sum-row total-row">
              <p>Total</p>
              <p id="totalPriceMobile"></p>
            </div>

            <button class="basket-btn" id="buyButtonMobile" onclick="openDialog()">Buy Now</button>
          </div>
        </div>
      </div>
    </div>

    <!------- DIALOG --------->
    <dialog id="orderDialog" class="dialog">
      <div class="dialog-frame">
        <div class="dialog-header">
          <button class="plus-minus-btn" onclick="closeDialog()">X</button>
        </div>
        <div class="dialog-content">
          <img src="./assets/icon/order-confirmed.png" alt="Order confirmed" />
          <h2>Order confirmed</h2>
          <p>Your food is on the way!</p>
        </div>
      </div>
    </dialog>
  </body>
</html>
