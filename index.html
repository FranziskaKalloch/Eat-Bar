<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eat Bar</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/frame.css" />
    <link rel="stylesheet" href="./styles/basket.css" />
    <script src="./script/data.js" defer></script>
    <script src="./script/main.js" defer></script>
    <script src="./script/template.js" defer></script>

    <link rel="icon" type="image/x-icon" href="./assets/icon/icons8-mahlzeit-96.png" />
  </head>

  <body onload="init()">
    <header>
      <div class="frame-header">
        <div class="logo-container">
          <img class="logo" src="./assets/eat-bar-logo.png" alt="Eat Bar Logo" />
          <span>food delivery</span>
        </div>

        <div>
          <img src="./assets/icon/icons8-menü-50.png" alt="Menu Icon" />
        </div>
      </div>
    </header>

    <section class="welcome">
      <img src="./assets/img/headline-img.png" class="main-img" alt="Burger headline image" />
      <img src="./assets/icon/imbisswagen.png" class="main-icon" alt="Food truck icon" />

      <div class="headline">
        <div class="burger-house">
          <h1>Burger<span class="highlight">House</span></h1>

          <div class="star-container">
            <img src="./assets/icon/icons8-stern.png" class="star-img" alt="Star icon" />
            <span>4,5 (4000)</span>
          </div>
        </div>

        <span class="welcome-text"> Best of burgers, Pizza, and Greens, all in one great place. </span>
      </div>
    </section>

    <main class="page-content">
      <!---------------- BURGER SECTION ---------------->
      <section class="menu-section">
        <div class="menu-header">
          <div class="menu-header-inner">
            <img src="./assets/icon/burger.png" class="burger-icon" alt="Burger icon" />
            <h2>Burger</h2>
          </div>
        </div>

        <div class="frame-main">
          <div class="frame-meal">
            <div class="card-container" id="burgerCards"></div>
          </div>
        </div>
      </section>

      <!---------------- PIZZA SECTION ---------------->
      <section class="menu-section">
        <div class="menu-header">
          <div class="menu-header-inner">
            <img src="./assets/icon/pizza.png" class="burger-icon" alt="Pizza icon" />
            <h2>Pizza (30cm)</h2>
          </div>
        </div>

        <div class="frame-main">
          <div class="frame-meal">
            <div class="card-container" id="pizzaCards"></div>
          </div>
        </div>
      </section>

      <!---------------- BASKET ---------------->
      <div class="frame-main basket-area">
        <aside class="frame-basket">
          <div class="basket">
            <div class="basket-headline">
              <h3>Your Basket</h3>
            </div>

            <div id="basketContent"></div>

            <div class="sum-section" id="sumSection">
              <div class="sum-row">
                <p>Subtotal</p>
                <p id="subTotal">Price</p>
              </div>

              <div class="sum-row">
                <p>Delivery Fee</p>
                <p id="deliveryFee">Price</p>
              </div>

              <div class="sum-row total-row">
                <p>Total</p>
                <p id="totalPrice">Price</p>
              </div>

              <button class="basket-btn" id="buyButton">Buy Now (price)</button>
            </div>
          </div>
        </aside>
      </div>
    </main>

    <footer>
      <div class="frame-header">
        <img class="logo" src="./assets/eat-bar-logo.png" alt="Eat Bar Logo" />
      </div>
    </footer>
  </body>
</html>
